name: toko_emas_digital
description: Aplikasi Toko Emas Digital - Flutter App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  
  # Supabase
  supabase_flutter: ^2.3.0
  
  # State Management
  provider: ^6.1.1
  
  # HTTP Client untuk API
  http: ^1.2.0
  
  # Image Picker
  image_picker: ^1.0.7
  
  # Shared Preferences
  shared_preferences: ^2.2.2
  
  # Intl untuk format tanggal dan currency
  intl: ^0.19.0
  
  # UUID Generator
  uuid: ^4.3.3
  
  # Google Fonts untuk tipografi premium (Kompatibel dengan Flutter 3.16.x)
  google_fonts: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
